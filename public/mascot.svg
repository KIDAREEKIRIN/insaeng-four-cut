    <ellipse cx="165" cy="55" rx="30" ry="34" transform="rotate(18 165 55)" fill="#8a3f2c"/>
    <ellipse cx="162" cy="58" rx="17" ry="20" transform="rotate(18 162 58)" fill="#fff3e2"/>
